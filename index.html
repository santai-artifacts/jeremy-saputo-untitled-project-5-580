<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .game-info {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
            color: white;
            font-size: 1.2em;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .info-value {
            font-weight: bold;
            font-size: 1.3em;
            color: #4ade80;
        }

        canvas {
            display: block;
            background: #1a1a1a;
            border: 3px solid white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin: 0 auto 20px;
        }

        .controls {
            color: white;
            margin-bottom: 20px;
            font-size: 0.95em;
            opacity: 0.9;
        }

        button {
            background: #4ade80;
            color: #1a1a1a;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
        }

        button:hover {
            background: #22c55e;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 26, 0.95);
            padding: 40px;
            border-radius: 12px;
            border: 2px solid white;
            text-align: center;
            display: none;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .game-over.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .game-over h2 {
            color: #ef4444;
            font-size: 2em;
            margin-bottom: 15px;
        }

        .game-over p {
            color: white;
            font-size: 1.3em;
            margin-bottom: 20px;
        }

        .game-over .score {
            color: #4ade80;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .game-info {
                flex-direction: column;
                gap: 10px;
            }

            canvas {
                max-width: 100vw;
                max-height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Snakez</h1>
        <div class="game-info">
            <div class="info-item">Score: <span class="info-value" id="score">0</span></div>
            <div class="info-item">Best: <span class="info-value" id="best">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            Use arrow keys to move • SPACE to play/pause
        </div>
        <button id="restartBtn">New Game</button>
    </div>

    <div class="game-over" id="gameOverModal">
        <h2>Game Over</h2>
        <p>Final Score: <span class="score" id="finalScore">0</span></p>
        <button id="playAgainBtn">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best');
        const gameOverModal = document.getElementById('gameOverModal');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let bestScore = localStorage.getItem('snakeBest') || 0;
        let gameRunning = true;
        let gamePaused = false;

        bestDisplay.textContent = bestScore;

        function drawTile(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.strokeRect(x * gridSize, y * gridSize, gridSize, gridSize);
        }

        function update() {
            if (!gameRunning || gamePaused) return;

            direction = nextDirection;

            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    drawTile(segment.x, segment.y, '#4ade80');
                } else {
                    drawTile(segment.x, segment.y, '#22c55e');
                }
            });

            // Draw food
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function spawnFood() {
            let newFood;
            let validPosition = false;

            while (!validPosition) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };

                validPosition = !snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
            }

            food = newFood;
        }

        function endGame() {
            gameRunning = false;

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('snakeBest', bestScore);
                bestDisplay.textContent = bestScore;
            }

            finalScoreDisplay.textContent = score;
            gameOverModal.classList.add('show');
        }

        function restartGame() {
            snake = [{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            scoreDisplay.textContent = 0;
            gameRunning = true;
            gamePaused = false;
            gameOverModal.classList.remove('show');
            spawnFood();
        }

        function gameLoop() {
            update();
            draw();
            setTimeout(gameLoop, 100);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                gamePaused = !gamePaused;
                return;
            }

            const key = e.key.toLowerCase();
            if (key === 'arrowup' && direction.y === 0) nextDirection = {x: 0, y: -1};
            if (key === 'arrowdown' && direction.y === 0) nextDirection = {x: 0, y: 1};
            if (key === 'arrowleft' && direction.x === 0) nextDirection = {x: -1, y: 0};
            if (key === 'arrowright' && direction.x === 0) nextDirection = {x: 1, y: 0};
        });

        restartBtn.addEventListener('click', restartGame);
        playAgainBtn.addEventListener('click', restartGame);

        gameLoop();
    </script>
</body>
</html>
